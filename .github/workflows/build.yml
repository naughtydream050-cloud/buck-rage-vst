name: Build RUDE HYPE

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Toolchain check
        shell: pwsh
        run: |
          cmake --version
          if (!(Test-Path -LiteralPath "JUCE")) { throw "JUCE submodule is missing" }

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: RUDE-HYPE-VST3-Windows
          path: build/**/*.vst3
          if-no-files-found: error

  build-macos-vst3:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Toolchain check
        shell: bash
        run: |
          set -euo pipefail
          cmake --version
          xcodebuild -version
          xcode-select -p
          test -d JUCE

      - name: Configure CMake
        shell: bash
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build VST3
        shell: bash
        run: cmake --build build --config Release --parallel

      - name: Assert VST3 artifact
        shell: bash
        run: |
          set -euo pipefail
          find build -name "*.vst3" -print
          test "$(find build -name "*.vst3" | wc -l | tr -d ' ')" -gt 0

      - name: Upload macOS VST3
        uses: actions/upload-artifact@v4
        with:
          name: RUDE-HYPE-VST3-macOS-arm64
          path: build/**/*.vst3
          if-no-files-found: error
